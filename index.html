<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salat Quest RPG</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #1c222d;
            --gold: #ffcc00;
            --blue: #00ccff;
            --gray: #444;
            --success: #2ecc71;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* RPG Header */
        .header {
            width: 100%;
            background: #161b22;
            padding: 20px 0;
            border-bottom: 3px solid var(--gold);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .level-circle {
            width: 60px;
            height: 60px;
            border: 4px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            font-size: 1.2rem;
            background: var(--card);
        }

        .exp-container {
            width: 80%;
            height: 10px;
            background: var(--gray);
            border-radius: 5px;
            margin: 10px auto;
            overflow: hidden;
        }

        #exp-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--success));
            width: 0%;
            transition: width 0.5s;
        }

        /* Active Quest Card */
        .current-quest {
            background: var(--card);
            width: 90%;
            max-width: 400px;
            margin: 20px 0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .timer {
            font-size: 2.5rem;
            font-family: monospace;
            color: #ff4444;
            margin: 10px 0;
        }

        .btn-pray {
            background: linear-gradient(180deg, #f1c40f, #f39c12);
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            color: #2c3e50;
        }

        .btn-pray:disabled {
            background: var(--gray);
            color: #888;
            cursor: not-allowed;
        }

        /* Daily Checklist */
        .daily-list {
            width: 90%;
            max-width: 400px;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px;
            padding: 15px;
            border-radius: 10px;
            align-items: center;
        }

        .prayer-item.done {
            border-left: 5px solid var(--success);
            opacity: 0.6;
        }

        .check-mark { font-size: 1.2rem; }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">⏳ Summoning Prayer Times...</div>

    <div class="header">
        <div class="level-circle" id="lvl-display">1</div>
        <div id="char-title">Novice Monk</div>
        <div class="exp-container">
            <div id="exp-bar"></div>
        </div>
        <div style="font-size: 0.8rem;">XP: <span id="xp-display">0</span> / <span id="next-lvl-xp">1000</span></div>
    </div>

    <div class="current-quest">
        <div style="color: var(--gold); letter-spacing: 2px; font-size: 0.8rem;">ACTIVE QUEST</div>
        <h2 id="active-name">Fajr</h2>
        <div class="timer" id="countdown">--:--:--</div>
        <div id="reward-hint" style="margin-bottom: 15px; font-size: 0.9rem;">Reward: <span id="potential-xp">0</span> XP</div>
        <button id="pray-btn" class="btn-pray">MARK AS DONE</button>
    </div>

    <div class="daily-list" id="checklist">
        <!-- Prayers will appear here -->
    </div>

    <script>
        // --- GAME STATE ---
        let state = JSON.parse(localStorage.getItem('salatQuestState')) || {
            xp: 0,
            lvl: 1,
            completedToday: {}, // Stores: { "2023-10-27_Fajr": true }
            lastDate: new Date().toLocaleDateString()
        };

        const PRAYER_NAMES = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
        let realTimes = {}; // Will be filled by API

        // --- CORE LOGIC ---

        function init() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(fetchTimes, () => {
                    alert("Location access denied. Using default times.");
                    document.getElementById('loading').innerText = "Location Error. Reload page.";
                });
            }
            updateUI();
        }

        async function fetchTimes(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const date = new Date().toLocaleDateString('en-GB').split('/').reverse().join('-'); // YYYY-MM-DD
            
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timings/${date}?latitude=${lat}&longitude=${lng}&method=2`);
                const data = await response.json();
                realTimes = data.data.timings;
                
                document.getElementById('loading').style.display = 'none';
                startClock();
                renderChecklist();
            } catch (err) {
                console.error("API Error:", err);
            }
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const currentPrayer = findActivePrayer(now);
                
                const prayerTime = getPrayerDateTime(realTimes[currentPrayer]);
                const nextPrayerName = getNextPrayerName(currentPrayer);
                const nextTime = getPrayerDateTime(realTimes[nextPrayerName]);

                // Calculate Remaining Time
                const diff = nextTime - now;
                if (diff > 0) {
                    const h = Math.floor(diff/3600000);
                    const m = Math.floor((diff%3600000)/60000);
                    const s = Math.floor((diff%60000)/1000);
                    document.getElementById('countdown').innerText = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }

                // Calculate Decay XP (Max 100, drops to 10)
                const totalWindow = nextTime - prayerTime;
                const elapsed = now - prayerTime;
                let potential = Math.floor(100 * (1 - (elapsed / totalWindow)));
                if (potential < 10) potential = 10;
                
                document.getElementById('active-name').innerText = currentPrayer.toUpperCase();
                document.getElementById('potential-xp').innerText = potential;

                // Disable button if already done today
                const todayKey = `${new Date().toLocaleDateString()}_${currentPrayer}`;
                document.getElementById('pray-btn').disabled = state.completedToday[todayKey];
                if(state.completedToday[todayKey]) {
                    document.getElementById('pray-btn').innerText = "QUEST COMPLETED";
                } else {
                    document.getElementById('pray-btn').innerText = "MARK AS DONE";
                }

            }, 1000);
        }

        function findActivePrayer(now) {
            // Checks which prayer window we are currently in
            for (let i = PRAYER_NAMES.length - 1; i >= 0; i--) {
                if (now > getPrayerDateTime(realTimes[PRAYER_NAMES[i]])) return PRAYER_NAMES[i];
            }
            return "Isha"; // Default to Isha if it's late night
        }

        function getNextPrayerName(current) {
            const idx = PRAYER_NAMES.indexOf(current);
            return PRAYER_NAMES[(idx + 1) % PRAYER_NAMES.length];
        }

        function getPrayerDateTime(timeStr) {
            const [hrs, mins] = timeStr.split(':');
            const d = new Date();
            d.setHours(hrs, mins, 0);
            return d;
        }

        // --- BUTTON ACTION ---
        document.getElementById('pray-btn').addEventListener('click', () => {
            const currentPrayer = findActivePrayer(new Date());
            const todayKey = `${new Date().toLocaleDateString()}_${currentPrayer}`;
            const xpGained = parseInt(document.getElementById('potential-xp').innerText);

            state.xp += xpGained;
            state.completedToday[todayKey] = true;

            // Level Up
            const target = state.lvl * 1000;
            if (state.xp >= target) {
                state.lvl++;
                state.xp = 0;
                alert("🎉 LEVEL UP! You reached level " + state.lvl);
            }

            save();
            updateUI();
            renderChecklist();
        });

        // --- UI HELPERS ---
        function save() {
            localStorage.setItem('salatQuestState', JSON.stringify(state));
        }

        function updateUI() {
            document.getElementById('lvl-display').innerText = state.lvl;
            document.getElementById('xp-display').innerText = state.xp;
            const target = state.lvl * 1000;
            document.getElementById('next-lvl-xp').innerText = target;
            document.getElementById('exp-bar').style.width = (state.xp / target * 100) + "%";
        }

        function renderChecklist() {
            const container = document.getElementById('checklist');
            container.innerHTML = "";
            const today = new Date().toLocaleDateString();

            PRAYER_NAMES.forEach(p => {
                const isDone = state.completedToday[`${today}_${p}`];
                const div = document.createElement('div');
                div.className = `prayer-item ${isDone ? 'done' : ''}`;
                div.innerHTML = `
                    <span>${p} <small>(${realTimes[p]})</small></span>
                    <span class="check-mark">${isDone ? '✅' : '⏳'}</span>
                `;
                container.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
